<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Effect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/estilo.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="contenido">
        <h1>MI GATO DICE MIAU</h1>
        <p>Ingeniera de Software e IA</p>
    </div>

    <section class="sobre-mi">
        <h2>Sobre Mí</h2>
        <div class="linea"></div>

        <div class="card">
            <div class="img-box">
                <img src="IMAGENES/winki.jpeg" alt="foto">
            </div>

            <div class="texto-box">
                <p>Hola! 👋 Soy Winki, Ingeniero en Sistemas de Información...</p>
            </div>
        </div>
    </section>

    <section class="tecnologias">
        <h2>Tecnologías que Utilizo</h2>
        <div class="linea"></div>

        <div class="tech-container">
            <div class="tech-card">
                <i class="fab fa-python"></i>
                <span>Python</span>
            </div>
            <div class="tech-card">
                <i class="fab fa-java"></i>
                <span>Java</span>
            </div>
            <div class="tech-card">
                <i class="fab fa-js"></i>
                <span>JavaScript</span>
            </div>
            <div class="tech-card">
                <i class="fas fa-database"></i>
                <span>Oracle SQL</span>
            </div>
            <div class="tech-card">
                <i class="fab fa-css3-alt"></i>
                <span>CSS3</span>
            </div>
            <div class="tech-card">
                <i class="fab fa-html5"></i>
                <span>HTML5</span>
            </div>
        </div>
    </section>

    <canvas id="matrix"></canvas>

    <script src="JS/script.js"></script>
</body>
</html>
